name: Lint Architecture

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-architecture:
    name: Run structural tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Check for structural tests
        id: check
        run: |
          test_files=$(find linters/structural-tests/ -type f ! -name '.gitkeep' 2>/dev/null)
          if [ -z "$test_files" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No structural tests found, skipping."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found structural tests:"
            echo "$test_files"
          fi

      - name: Run structural tests
        if: steps.check.outputs.found == 'true'
        id: tests
        run: |
          violations=0
          for test_file in linters/structural-tests/*; do
            [ -f "$test_file" ] || continue
            [ "$(basename "$test_file")" = ".gitkeep" ] && continue
            echo "--- Running: $test_file ---"
            if [ -x "$test_file" ]; then
              if ! "$test_file"; then
                violations=$((violations + 1))
              fi
            elif [[ "$test_file" == *.sh ]]; then
              if ! bash "$test_file"; then
                violations=$((violations + 1))
              fi
            else
              echo "Skipping non-executable: $test_file"
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "::error::$violations structural test(s) reported violations."
            exit 1
          fi
          echo "All structural tests passed."
