name: Lint Kb

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-kb:
    name: Run kb lints
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          persist-credentials: false

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install shellcheck
        run: |
          if ! command -v shellcheck &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi

      - name: Run lint kb
        id: lints
        run: |
          set +e
          output=$(uv run rcorn kb lint 2>&1)
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          {
            echo "output<<LINT_EOF"
            echo "$output"
            echo "LINT_EOF"
          } >> "$GITHUB_OUTPUT"
          exit $exit_code
        continue-on-error: true

      - name: Post PR comment on failure
        # Fork PRs run with a read-only token, so createComment would 403;
        # outside contributors still see the failure via the final step + logs.
        if: steps.lints.outputs.exit_code != '0' && !github.event.pull_request.head.repo.fork
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          # Pass lint output as data, never interpolated into the script source.
          # Otherwise a backtick or ${...} in kb content would break out of the
          # template literal and run arbitrary JS with the pull-requests token.
          LINT_OUTPUT: ${{ steps.lints.outputs.output }}
        with:
          script: |
            const output = process.env.LINT_OUTPUT;
            const body = `### Kb Lint Failures\n\n\`\`\`\n${output}\n\`\`\`\n\n> Posted by the lint-kb workflow.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Fail if lints failed
        if: steps.lints.outputs.exit_code != '0'
        run: exit 1
